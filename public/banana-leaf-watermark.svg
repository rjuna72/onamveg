<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7d32" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2f7d32" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- background is transparent by default -->

  <!-- Leaf 1 -->
  <g transform="translate(90 120) rotate(-12)">
    <path d="M110 20 C 40 120, 40 260, 120 360 C 220 250, 240 120, 110 20 Z"
          fill="url(#leafGrad)"/>
    <path d="M120 45 C 105 140, 110 230, 130 330"
          stroke="#2f7d32" stroke-opacity="0.18" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M115 95 C 85 130, 70 165, 62 200"
          stroke="#2f7d32" stroke-opacity="0.12" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M126 110 C 155 145, 175 185, 188 220"
          stroke="#2f7d32" stroke-opacity="0.10" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Leaf 2 (smaller, offset) -->
  <g transform="translate(360 320) rotate(18) scale(0.85)">
    <path d="M110 20 C 40 120, 40 260, 120 360 C 220 250, 240 120, 110 20 Z"
          fill="url(#leafGrad)"/>
    <path d="M120 45 C 105 140, 110 230, 130 330"
          stroke="#2f7d32" stroke-opacity="0.16" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M115 95 C 85 130, 70 165, 62 200"
          stroke="#2f7d32" stroke-opacity="0.10" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M126 110 C 155 145, 175 185, 188 220"
          stroke="#2f7d32" stroke-opacity="0.08" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
